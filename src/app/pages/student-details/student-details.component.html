<div *ngIf="student">
  <h2>{{ student.firstName }} {{ student.lastName }}</h2>

  <p>Age: {{ student.age }}</p>
  <p>Email: {{ student.email }}</p>
  <p>Department: {{ student.department }}</p>
  <p>GPA: {{ student.GPA }}</p>
  <p>City: {{ student.city }}</p>
  <p>Country: {{ student.country }}</p>
</div>
